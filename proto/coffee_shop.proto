syntax = "proto3";
package coffeeshop;

option go_package = "github.com/unsubstantiated-Script/gRPCCoffee";

service CoffeeShop {
  rpc GetMenu (MenuRequest) returns (Menu) {}
  rpc PlaceOrder (Order) returns (Receipt) {}
  rpc GetOrderStatus (Receipt) returns (OrderStatus) {}
}

message MenuRequest {}

message Menu {
  repeated Item items = 1;
}


message Item {
  string id = 1;
  string name = 2;
}

message Order {
  repeated Item items = 1;
}

message Receipt {
  string id = 1;
}

message OrderStatus {
  string orderId = 1;
  string status = 2;
}


